<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f13;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      user-select: none;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #4ade80;
      text-shadow: 0 0 20px #4ade8066;
    }

    #scoreboard {
      display: flex;
      gap: 32px;
      font-size: 0.85rem;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
    }

    #scoreboard span { color: #fff; font-weight: 600; }

    #canvas-wrapper {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid #222;
      border-radius: 8px;
      box-shadow: 0 0 40px #4ade8022;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0,0,0,0.75);
      border-radius: 6px;
      backdrop-filter: blur(4px);
    }

    #overlay h2 {
      font-size: 1.6rem;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    #overlay p {
      color: #888;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    #overlay .final-score {
      font-size: 3rem;
      font-weight: 700;
      color: #4ade80;
      text-shadow: 0 0 20px #4ade8066;
    }

    button {
      margin-top: 8px;
      padding: 10px 32px;
      background: #4ade80;
      color: #0f0f13;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover { background: #86efac; }
    button:active { transform: scale(0.97); }

    #dpad {
      display: none;
      gap: 0;
      flex-direction: column;
      align-items: center;
    }

    #dpad .row { display: flex; }

    .dpad-btn {
      width: 52px;
      height: 52px;
      background: #1e1e2a;
      border: 2px solid #333;
      color: #aaa;
      font-size: 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }

    .dpad-btn:active { background: #2a2a3a; color: #4ade80; }

    .dpad-spacer { width: 52px; height: 52px; }

    @media (max-width: 520px) {
      #dpad { display: flex; }
      canvas { width: 320px; height: 320px; }
    }

    @media (pointer: coarse) {
      #dpad { display: flex; }
    }
  </style>
</head>
<body>

  <h1>Snake</h1>

  <div id="scoreboard">
    Score: <span id="score">0</span>&nbsp;&nbsp;|&nbsp;&nbsp;Best: <span id="best">0</span>&nbsp;&nbsp;|&nbsp;&nbsp;Level: <span id="level">1</span>
  </div>

  <div id="canvas-wrapper">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2>Snake</h2>
      <p>Arrow keys or WASD to move</p>
      <button id="start-btn">Start Game</button>
    </div>
  </div>

  <div id="dpad">
    <div class="row">
      <div class="dpad-spacer"></div>
      <button class="dpad-btn" data-dir="up">▲</button>
      <div class="dpad-spacer"></div>
    </div>
    <div class="row">
      <button class="dpad-btn" data-dir="left">◀</button>
      <div class="dpad-spacer"></div>
      <button class="dpad-btn" data-dir="right">▶</button>
    </div>
    <div class="row">
      <div class="dpad-spacer"></div>
      <button class="dpad-btn" data-dir="down">▼</button>
      <div class="dpad-spacer"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const levelEl = document.getElementById('level');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    const COLORS = {
      bg: '#0f0f13',
      grid: '#13131a',
      snakeHead: '#4ade80',
      snakeBody: '#22c55e',
      snakeTail: '#16a34a',
      food: '#f87171',
      foodGlow: '#f8717166',
      bonus: '#facc15',
      bonusGlow: '#facc1566',
    };

    let snake, dir, nextDir, food, bonus, score, best, level, gameLoop, running, bonusTimer;

    best = parseInt(localStorage.getItem('snake-best') || '0');
    bestEl.textContent = best;

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      level = 1;
      bonus = null;
      bonusTimer = 0;
      scoreEl.textContent = 0;
      levelEl.textContent = 1;
      placeFood();
    }

    function placeFood() {
      food = randomEmpty();
    }

    function placeBonus() {
      bonus = randomEmpty();
      bonusTimer = 80; // ticks before it disappears
    }

    function randomEmpty() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (
        snake.some(s => s.x === pos.x && s.y === pos.y) ||
        (food && food.x === pos.x && food.y === pos.y)
      );
      return pos;
    }

    function speed() {
      // Start at 150ms, get faster each level, floor at 60ms
      return Math.max(60, 150 - (level - 1) * 10);
    }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return gameOver();
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);

      let ate = false;

      if (head.x === food.x && head.y === food.y) {
        score += 10 * level;
        scoreEl.textContent = score;
        ate = true;
        level = Math.floor(snake.length / 5) + 1;
        levelEl.textContent = level;
        placeFood();

        // Chance to spawn bonus
        if (Math.random() < 0.25 && !bonus) placeBonus();
      } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
        score += 50 * level;
        scoreEl.textContent = score;
        ate = true;
        bonus = null;
      } else {
        snake.pop();
      }

      // Bonus timer
      if (bonus) {
        bonusTimer--;
        if (bonusTimer <= 0) bonus = null;
      }

      if (ate && score > best) {
        best = score;
        bestEl.textContent = best;
        try { localStorage.setItem('snake-best', best); } catch(e) {}
      }

      draw();

      if (running) {
        gameLoop = setTimeout(step, speed());
      }
    }

    function draw() {
      const W = canvas.width;
      const H = canvas.height;

      // Background
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, W, H);

      // Grid dots
      ctx.fillStyle = COLORS.grid;
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillRect(x * GRID + GRID / 2 - 1, y * GRID + GRID / 2 - 1, 2, 2);
        }
      }

      // Food
      drawCell(food.x, food.y, COLORS.food, COLORS.foodGlow, true);

      // Bonus food
      if (bonus) {
        const pulse = bonusTimer % 20 < 10 ? 1 : 0.6;
        ctx.globalAlpha = pulse;
        drawCell(bonus.x, bonus.y, COLORS.bonus, COLORS.bonusGlow, true);
        ctx.globalAlpha = 1;
      }

      // Snake
      snake.forEach((seg, i) => {
        const t = i / (snake.length - 1 || 1);
        // Gradient from head to tail
        const color = i === 0 ? COLORS.snakeHead : lerpColor(COLORS.snakeBody, COLORS.snakeTail, t);
        const inset = i === 0 ? 1 : 2;
        ctx.fillStyle = color;
        ctx.beginPath();
        roundRect(
          seg.x * GRID + inset,
          seg.y * GRID + inset,
          GRID - inset * 2,
          GRID - inset * 2,
          i === 0 ? 5 : 3
        );
        ctx.fill();

        // Eyes on head
        if (i === 0) {
          const ex1 = seg.x * GRID + GRID / 2 + dir.y * 3 - dir.x * 3;
          const ey1 = seg.y * GRID + GRID / 2 + dir.x * 3 - dir.y * 3;
          const ex2 = seg.x * GRID + GRID / 2 + dir.y * 3 + dir.x * 3;
          const ey2 = seg.y * GRID + GRID / 2 - dir.x * 3 + dir.y * 3;
          ctx.fillStyle = '#0f0f13';
          ctx.beginPath(); ctx.arc(ex1 + dir.x * 4, ey1 + dir.y * 4, 2.5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2 + dir.x * 4, ey2 + dir.y * 4, 2.5, 0, Math.PI * 2); ctx.fill();
        }
      });
    }

    function drawCell(x, y, color, glow, circle) {
      if (glow) {
        ctx.shadowColor = glow;
        ctx.shadowBlur = 12;
      }
      ctx.fillStyle = color;
      if (circle) {
        ctx.beginPath();
        ctx.arc(x * GRID + GRID / 2, y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(x * GRID + 2, y * GRID + 2, GRID - 4, GRID - 4);
      }
      ctx.shadowBlur = 0;
    }

    function roundRect(x, y, w, h, r) {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function lerpColor(a, b, t) {
      const ah = a.replace('#','');
      const bh = b.replace('#','');
      const ar = parseInt(ah.slice(0,2),16), ag = parseInt(ah.slice(2,4),16), ab = parseInt(ah.slice(4,6),16);
      const br = parseInt(bh.slice(0,2),16), bg = parseInt(bh.slice(2,4),16), bb = parseInt(bh.slice(4,6),16);
      const r = Math.round(ar + (br - ar) * t).toString(16).padStart(2,'0');
      const g = Math.round(ag + (bg - ag) * t).toString(16).padStart(2,'0');
      const bx = Math.round(ab + (bb - ab) * t).toString(16).padStart(2,'0');
      return `#${r}${g}${bx}`;
    }

    function gameOver() {
      running = false;
      clearTimeout(gameLoop);

      if (score > best) best = score;
      try { localStorage.setItem('snake-best', best); } catch(e) {}
      bestEl.textContent = best;

      overlay.innerHTML = `
        <h2 style="color:#f87171">Game Over</h2>
        <div class="final-score">${score}</div>
        <p>Best: ${best} &nbsp;|&nbsp; Level: ${level}</p>
        <button id="start-btn">Play Again</button>
      `;
      overlay.style.display = 'flex';
      document.getElementById('start-btn').addEventListener('click', startGame);
    }

    function startGame() {
      overlay.style.display = 'none';
      init();
      running = true;
      gameLoop = setTimeout(step, speed());
    }

    // Keyboard input
    const keyMap = {
      ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
      w: 'up', s: 'down', a: 'left', d: 'right',
      W: 'up', S: 'down', A: 'left', D: 'right',
    };

    function handleDir(d) {
      if (d === 'up'    && dir.y !== 1)  nextDir = { x: 0, y: -1 };
      if (d === 'down'  && dir.y !== -1) nextDir = { x: 0, y:  1 };
      if (d === 'left'  && dir.x !== 1)  nextDir = { x: -1, y: 0 };
      if (d === 'right' && dir.x !== -1) nextDir = { x:  1, y: 0 };
    }

    document.addEventListener('keydown', e => {
      if (e.key === ' ' && !running) { startGame(); return; }
      const d = keyMap[e.key];
      if (d) { e.preventDefault(); handleDir(d); }
    });

    document.querySelectorAll('.dpad-btn').forEach(btn => {
      btn.addEventListener('click', () => handleDir(btn.dataset.dir));
    });

    startBtn.addEventListener('click', startGame);

    // Initial draw
    init();
    draw();
  </script>
</body>
</html>
